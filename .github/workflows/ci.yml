name: CI — Tests

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master, 'feature/**']

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───────────────────────────────────────────
  # Backend — pytest (Django + SQLite)
  # ───────────────────────────────────────────
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies (for ast-parser tests)
        working-directory: frontend
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq pkg-config default-libmysqlclient-dev ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate --no-input

      - name: Run pytest with coverage
        run: pytest -v --tb=short --junitxml=pytest-results.xml --cov=base_feature_app --cov-branch --cov-report=json:coverage-backend.json --cov-report=xml:coverage-backend.xml

      - name: Backend coverage summary
        if: always()
        run: python3 "$GITHUB_WORKSPACE/scripts/ci/backend-job-summary.py" >> "$GITHUB_STEP_SUMMARY" || true

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-backend
          path: |
            backend/coverage-backend.json
            backend/pytest-results.xml
          retention-days: 5

  # ───────────────────────────────────────────
  # Frontend — Jest unit & component tests
  # ───────────────────────────────────────────
  frontend-unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Run Jest tests with coverage
        run: |
          NODE_OPTIONS='--no-deprecation' npx jest --config jest.config.cjs --coverage --ci --forceExit --json --outputFile=jest-results.json || true
          node scripts/coverage-summary.cjs
          # Fail the step if tests failed
          node -e "const r=require('./jest-results.json'); if(!r.success) process.exit(1);"

      - name: Copy test results alongside coverage
        if: always()
        run: cp jest-results.json coverage/ 2>/dev/null || true

      - name: Frontend unit coverage summary
        if: always()
        run: node "$GITHUB_WORKSPACE/scripts/ci/frontend-job-summary.cjs" >> "$GITHUB_STEP_SUMMARY" || true

      - name: Upload frontend-unit coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-frontend-unit
          path: |
            frontend/coverage/coverage-summary.json
            frontend/coverage/jest-results.json
          retention-days: 5

  # ───────────────────────────────────────────
  # Frontend — Playwright E2E tests (4 grupos en paralelo)
  # ───────────────────────────────────────────
  frontend-e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 18
    strategy:
      fail-fast: false
      matrix:
        include:
          - part: 1
            label: public
            files: "e2e/public/smoke.spec.ts e2e/public/navigation.spec.ts e2e/public/blogs.spec.ts"
          - part: 2
            label: catalog
            files: "e2e/public/products.spec.ts e2e/app/user-flows.spec.ts"
          - part: 3
            label: auth
            files: "e2e/auth/auth.spec.ts"
          - part: 4
            label: purchase
            files: "e2e/app/cart.spec.ts e2e/app/checkout.spec.ts e2e/app/complete-purchase.spec.ts"
    name: E2E ${{ matrix.part }}/4 — ${{ matrix.label }}
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq pkg-config default-libmysqlclient-dev ffmpeg

      - name: Create backend venv and install deps
        working-directory: backend
        run: |
          python -m venv venv
          venv/bin/pip install -r requirements.txt

      - name: Run backend migrations
        working-directory: backend
        run: venv/bin/python manage.py migrate --no-input

      - name: Build Next.js app
        run: npm run build
        env:
          NEXT_PUBLIC_BACKEND_ORIGIN: http://127.0.0.1:8000

      - name: Install Playwright browsers with system deps
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests (${{ matrix.label }})
        run: npx playwright test ${{ matrix.files }}
        env:
          CI: 'true'
          NEXT_PUBLIC_BACKEND_ORIGIN: http://127.0.0.1:8000

      - name: Upload E2E results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-frontend-e2e-${{ matrix.part }}
          path: |
            frontend/e2e-results/flow-coverage.json
            frontend/e2e-results/results.json
          retention-days: 5

      - name: Upload test traces (failures only)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-${{ matrix.part }}
          path: frontend/test-results/
          retention-days: 7

  # ───────────────────────────────────────────
  # Coverage Summary — aggregates all reports
  # ───────────────────────────────────────────
  coverage-summary:
    if: always()
    needs: [backend-tests, frontend-unit-tests, frontend-e2e-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-backend
          path: coverage-artifacts/backend
        continue-on-error: true

      - name: Download frontend-unit coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-frontend-unit
          path: coverage-artifacts/frontend-unit
        continue-on-error: true

      - name: Download frontend-e2e coverage
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-frontend-e2e-*
          path: coverage-artifacts/frontend-e2e
          merge-multiple: true
        continue-on-error: true

      - name: Generate coverage summary
        if: always()
        id: summary
        run: node scripts/coverage-summary-ci.cjs

      - name: Write Job Summary
        run: cat coverage-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report (md)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-md
          path: coverage-report.md
          retention-days: 5

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: coverage-report.md

